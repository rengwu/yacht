name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          version="${GITHUB_REF_NAME#v}"
          ./build.sh "$version"

      - name: Build DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Yacht" \
            --window-size 500 320 \
            --icon-size 100 \
            --icon "Yacht.app" 125 160 \
            --app-drop-link 375 160 \
            --no-internet-enable \
            "build/yacht-${GITHUB_REF_NAME}.dmg" \
            "build/Yacht.app"
          # Unversioned copy so the README can link straight to
          # .../releases/latest/download/Yacht.dmg without going stale.
          cp "build/yacht-${GITHUB_REF_NAME}.dmg" "build/Yacht.dmg"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/yacht-*.dmg
            build/Yacht.dmg
          generate_release_notes: true
